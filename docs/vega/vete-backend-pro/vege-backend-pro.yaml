      connector_type:
        type: string
      description:
        type: string
      name:
        type: string
      tags:
        items:
          type: string
        type: array
    type: object
  interfaces.ConnectorConfig:
    additionalProperties: {}
    type: object
  interfaces.DiscoverResult:
    properties:
      catalog_id:
        type: string
      message:
        type: string
      new_count:
        type: integer
      stale_count:
        type: integer
      unchanged_count:
        type: integer
    type: object
  interfaces.DiscoverTask:
    properties:
      catalog_id:
        type: string
      create_time:
        type: integer
      creator:
        $ref: '#/definitions/interfaces.AccountInfo'
      finish_time:
        description: 完成时间
        type: integer
      id:
        type: string
      message:
        type: string
      progress:
        description: 0-100
        type: integer
      result:
        $ref: '#/definitions/interfaces.DiscoverResult'
      start_time:
        description: 开始执行时间
        type: integer
      status:
        description: pending/running/completed/failed
        type: string
      trigger_type:
        description: manual/scheduled
        type: string
    type: object
  interfaces.Property:
    properties:
      description:
        type: string
      display_name:
        type: string
      name:
        type: string
      original_name:
        type: string
      type:
        type: string
    type: object
  interfaces.ResourceDataQueryParams:
    properties:
      filter_condition: {}
      limit:
        type: integer
      need_total:
        type: boolean
      offset:
        type: integer
      output_fields:
        description: 指定输出的字段列表
        items:
          type: string
        type: array
      sort:
        items:
          $ref: '#/definitions/interfaces.SortField'
        type: array
    type: object
  interfaces.ResourceRequest:
    properties:
      catalog_id:
        type: string
      category:
        type: string
      database:
        description: 所属数据库（实例级 Catalog 时填充）
        type: string
      description:
        type: string
      name:
        type: string
      schema_definition:
        description: Schema定义
        items:
          $ref: '#/definitions/interfaces.Property'
        type: array
      source_identifier:
        description: 源端标识（原始表名/路径）
        type: string
      status:
        type: string
      tags:
        items:
          type: string
        type: array
    type: object
  interfaces.SortField:
    properties:
      direction:
        type: string
      field:
        type: string
    type: object
