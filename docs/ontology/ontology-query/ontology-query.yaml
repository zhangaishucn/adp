      properties:
        type:
          description: 数据来源类型
          enum:
          - metric
          - operator
          type: string
        id:
          description: 数据来源ID
          type: string
        name:
          description: 名称。查看详情时返回。
          type: string
    Parameter:
      oneOf:
      - $ref: '#/components/schemas/Parameter4Operator'
      - $ref: '#/components/schemas/Parameter4Metric'
      description: 逻辑/指标参数
      type: object
    Parameter4Operator:
      description: 逻辑参数
      required:
      - name
      - value_from
      type: object
      properties:
        name:
          description: 参数名称
          type: string
        type:
          description: 参数类型
          type: string
        source:
          description: 参数来源
          type: string
        value_from:
          description: 值来源
          enum:
          - property
          - input
          type: string
        value:
          description: 参数值。value_from=property时，填入的是对象类的数据属性名称；value_from=input时，不设置此字段
          type: string
    Parameter4Metric:
      description: 逻辑参数
      required:
      - name
      - value_from
      - operation
      type: object
      properties:
        name:
          description: 参数名称
          type: string
        value_from:
          description: 值来源
          enum:
          - property
          - input
          type: string
        value:
          description: 参数值。value_from=property时，填入的是对象类的数据属性名称；value_from=input时，不设置此字段
          type: string
        operation:
          description: 操作符。映射指标模型的属性时，此字段必须
          enum:
          - in
          - '='
          - '!='
          - '>'
          - '>='
          - '<'
          - '<='
          type: string
    PageTurnQueryWithSearchAfter:
      description: 分页查询的第一次查询请求
      required:
      - limit
      - search_after
      type: object
      properties:
        condition:
          $ref: '#/components/schemas/Condition'
          description: 过滤条件
        sort:
          description: 排序字段，默认使用 _score 倒序，主键字段正序
          type: array
          items:
            $ref: '#/components/schemas/Sort'
        limit:
          description: 返回的数量，默认值 10。范围 1-10000
          type: integer
        need_total:
          description: 是否需要总数，默认false
          type: boolean
        search_after:
          description: 上次查询返回的最后一个文档的排序值。
          type: array
          items: {}
        properties:
          description: 指定需要输出的属性集。默认为全部数据属性
          type: array
          items:
            type: string
    RelationPath:
      description: 对象的关系路径
      required:
