          description: 对象实例的显示属性值。显示属性只选一个，所以这里直接展示值即可。默认返回，当 exclude_system_properties 排除时，不返回。
    ObjectInfo:
      description: 对象信息
      required: []
      type: object
      properties:
        _instance_id:
          description: 实例id。默认返回，当 exclude_system_properties 排除时，不返回。
          type: string
        _instance_identity:
          $ref: '#/components/schemas/InstanceIdentity'
          description: 实例标识。默认返回，当 exclude_system_properties 排除时，不返回。
        _display:
          description: 对象的显示属性值。默认返回，当 exclude_system_properties 排除时，不返回。
      additionalProperties:
        oneOf:
        - type: string
        - type: number
        - type: boolean
        - type: integer
