        object_type_id:
          description: 对象类ID
          type: string
        object_type_name:
          description: 对象类名称
          type: string
        properties:
          description: 属性值列表。map中key是属性名，value是属性值
          type: object
          additionalProperties:
            oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: integer
            - $ref: '#/components/schemas/MetricProperty'
            - $ref: '#/components/schemas/OperatorProperty'
        _instance_id:
          description: 对象实例id：对象类id-根据联合主键生成的对象id。默认返回，当 exclude_system_properties 排除时，不返回。
          type: string
        _display:
          description: 对象实例的显示属性值。显示属性只选一个，所以这里直接展示值即可。默认返回，当 exclude_system_properties 排除时，不返回。
        _instance_identity:
          $ref: '#/components/schemas/InstanceIdentity'
          description: 对象实例标识。key为属性名称，value为属性值。id是主键的字符串表现形式。默认返回，当 exclude_system_properties 排除时，不返回。
          additionalProperties:
            oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: integer
    ObjectPropertyValue:
      description: 对象的属性值
      type: object
      properties:
        _instance_id:
          description: 对象实例id：对象类id-根据联合主键生成的对象id。默认返回，当 exclude_system_properties 排除时，不返回。
          type: string
        _instance_identity:
          $ref: '#/components/schemas/InstanceIdentity'
          description: 对象实例标识。key为属性名称，value为属性值。id是主键的字符串表现形式。默认返回，当 exclude_system_properties 排除时，不返回。
        _display:
          description: 对象实例的显示属性值。显示属性只选一个，所以这里直接展示值即可。默认返回，当 exclude_system_properties 排除时，不返回。
      additionalProperties:
        oneOf:
        - type: string
        - type: number
        - type: boolean
        - type: integer
        - $ref: '#/components/schemas/MetricPropertyValue'
        - type: object
    OperatorProperty:
      description: 算子属性
      required:
      - property_type
      - mapping_source_id
      - has_any_unfilled_params
      - parameters
      - dynamic_params
      type: object
      properties:
        property_type:
          description: 属性类型
          enum:
          - metric
          type: string
        mapping_source_id:
          description: 映射的指标模型id
          type: string
        has_any_unfilled_params:
          description: 是否有未填充的参数，默认是false
          type: boolean
        parameters:
          description: 实例化了的参数。是个map
          type: object
          additionalProperties:
            oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: integer
            - type: object
        dynamic_params:
          description: 动态参数。是个map
          type: object
          additionalProperties: {}
    MetricData:
      description: 指标模型的指标数据计算结果
      required:
      - labels
      - times
      - time_strs
      - values
      type: object
      properties:
        labels:
          description: 普通维度 label 的 map，key 为字段名，value 为字段值，键值的类型都是 string
          type: object
          additionalProperties:
            oneOf:
            - type: string
        times:
          description: 时间值数组。为字符串或者数值类型
          type: array
          items:
            type: object
        time_strs:
          description: 时间字符串数组。
          type: array
          items:
            type: object
        values:
          description: 度量值数组。数值类型
          type: array
          items:
            type: number
        growth_values:
          description: 增长值。当请求了同环比分析时才有此字段。
          type: array
          items:
            type: number
        growth_rates:
          description: 增长率。当请求了同环比分析时才有此字段。
          type: array
          items:
            type: number
        proportions:
          description: 占比。当请求了占比分析时才有此字段。
          type: array
          items:
            type: number
    PropertyQueryBody:
      description: 属性查询请求体
      required:
      - properties
      - __instance_identities
      type: object
      properties:
        __instance_identities:
          description: 对象主键的数组，代表多个对象。map，key为主键属性名，value为对应的属性值
          type: array
          items:
            $ref: '#/components/schemas/InstanceIdentity'
        properties:
          description: 属性列表
          type: array
          items:
            type: string
        dynamic_params:
          description: |
            各个逻辑属性所需的动态参数。是个map，key为属性名称，value为map，其key为参数名，值为赋予的参数值。
            当属性是指标属性时，dynamic_params 的结构应遵循 MetricPropertyDynamicParams schema，包含：
            - 时间参数：start（开始时间戳，毫秒）、end（结束时间戳，毫秒）、instant（是否即时查询）、step（步长，如"1m"、"1h"等）
            - 分析参数：analysis_dimensions（分析维度数组）、order_by_fields（排序字段数组）、having_condition（having值过滤条件）、metrics（同环比、占比分析配置）
            - 配置的动态参数：指标属性配置中定义的其他动态参数（如 pod_ip、pod_name 等）
          additionalProperties:
            oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: integer
            - $ref: '#/components/schemas/MetricPropertyDynamicParams'
