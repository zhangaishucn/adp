                value:
                  condition:
                    operation: and
                    sub_conditions:
                    - field: pod_namespace
                      operation: ==
                      value: anyshare
                      value_from: const
                    - field: pod_status
                      operation: ==
                      value: Running
                      value_from: const
                  need_total: true
                  limit: 10
