    InstanceIdentity:
      description: 唯一标识。
      type: object
      additionalProperties:
        oneOf:
        - type: string
        - type: integer
    InstanceIdentities:
      description: 对象唯一标识
      required:
      - __instance_identities
      type: object
      properties:
        __instance_identities:
          description: 对象主键的数组，代表多个对象。map，key为主键属性名，value为对应的属性值
          type: array
          items:
            $ref: '#/components/schemas/InstanceIdentity'
        dynamic_params:
          description: 动态参数，用于填充行动参数
          type: object
          additionalProperties: true

    ActionExecutionResponse:
      description: 行动执行响应（异步）
      type: object
      properties:
        execution_id:
          description: 执行ID
          type: string
        status:
          description: 执行状态
          enum:
            - pending
            - running
            - completed
            - failed
          type: string
        message:
          description: 提示消息
          type: string
        created_at:
          description: 创建时间（毫秒时间戳）
          type: integer
          format: int64

    ActionExecution:
      description: 行动执行详情
      type: object
      properties:
        id:
          description: 执行ID
          type: string
        kn_id:
          description: 业务知识网络ID
          type: string
        action_type_id:
          description: 行动类ID
          type: string
        action_type_name:
          description: 行动类名称
          type: string
        action_source_type:
          description: 行动源类型
          enum:
            - tool
            - mcp
          type: string
        object_type_id:
          description: 对象类ID
          type: string
        trigger_type:
          description: 触发类型
          enum:
            - manual
            - scheduled
          type: string
        status:
          description: 执行状态
          enum:
            - pending
            - running
            - completed
            - failed
            - cancelled
          type: string
        total_count:
          description: 对象总数
          type: integer
        success_count:
          description: 成功数量
          type: integer
        failed_count:
          description: 失败数量
          type: integer
        results:
          description: 每个对象的执行结果（分页返回）
          type: array
          items:
            $ref: "#/components/schemas/ObjectExecutionResult"
        results_total:
          description: results 总数（用于分页）
          type: integer
        results_offset:
          description: 当前 results 偏移量
          type: integer
        results_limit:
          description: 当前 results 分页大小
          type: integer
        dynamic_params:
          description: 动态参数
          type: object
          additionalProperties: true
        executor_id:
          description: 执行者ID（已废弃，请使用 executor）
          type: string
          deprecated: true
        executor:
          description: 执行者信息
          type: object
          properties:
            id:
              description: 执行者ID
              type: string
            type:
              description: 执行者类型
              type: string
            name:
              description: 执行者名称
              type: string
        start_time:
          description: 开始时间（毫秒时间戳）
          type: integer
          format: int64
        end_time:
          description: 结束时间（毫秒时间戳）
          type: integer
          format: int64
        duration_ms:
          description: 执行耗时（毫秒）
          type: integer
          format: int64
        action_type_snapshot:
          description: 执行时的行动类配置快照（与 ontology-manager 返回一致）
          type: object
          additionalProperties: true

    ObjectExecutionResult:
      description: 单个对象的执行结果
      type: object
      properties:
        instance_identity:
          description: 对象实例标识
          type: object
          additionalProperties: true
        status:
          description: 执行状态
          enum:
            - pending
            - success
            - failed
            - cancelled
          type: string
        parameters:
          description: 解析后的执行参数
          type: object
          additionalProperties: true
        result:
          description: 执行结果
          type: object
          additionalProperties: true
        error_message:
          description: 错误消息
          type: string
        duration_ms:
          description: 执行耗时（毫秒）
          type: integer
          format: int64

    ActionLogQuery:
      description: 行动执行日志查询
      type: object
      properties:
        action_type_id:
          description: 行动类ID（可选）
          type: string
        status:
          description: 执行状态（可选）
          enum:
            - pending
            - running
            - completed
            - failed
            - cancelled
          type: string
        trigger_type:
          description: 触发类型（可选）
          enum:
            - manual
            - scheduled
          type: string
        start_time_range:
          description: 开始时间范围 [起始, 结束]（毫秒时间戳）
          type: array
          items:
            type: integer
            format: int64
          minItems: 2
          maxItems: 2
        limit:
          description: 返回数量限制，默认20，最大1000
          type: integer
          default: 20
        need_total:
          description: 是否需要返回总数
          type: boolean
          default: false
        search_after:
          description: 分页游标
          type: array
          items: {}

    ActionExecutionList:
      description: 行动执行日志列表
      type: object
      properties:
        entries:
          description: 执行记录列表
          type: array
          items:
            $ref: "#/components/schemas/ActionExecution"
        total_count:
          description: 总数（当 need_total 为 true 时返回）
          type: integer
        search_after:
          description: 下一页游标
          type: array
          items: {}

    CancelExecutionRequest:
      description: 取消执行请求
      type: object
      properties:
        reason:
          description: 取消原因（可选）
          type: string

    CancelExecutionResponse:
      description: 取消执行响应
      type: object
      properties:
        execution_id:
          description: 执行ID
          type: string
        status:
          description: 执行状态
          enum:
            - cancelled
          type: string
        message:
          description: 提示消息
          type: string
        cancelled_count:
          description: 被取消的对象数量（原本 pending 状态的对象）
          type: integer
        completed_count:
          description: 已完成的对象数量（取消前已执行完成的对象）
          type: integer
