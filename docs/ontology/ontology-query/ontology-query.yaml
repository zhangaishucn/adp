      - target_object_id
      type: object
      properties:
        relation_type_id:
          description: 关系类id
          type: string
        relation_type_name:
          description: 关系类名称
          type: string
        source_object_id:
          description: 起点对象id
          type: string
        target_object_id:
          description: 终点对象id
          type: string
    ObjectTypeOnPath:
      description: 路径中的对象类信息
      required:
      - id
      type: object
      properties:
        id:
          description: 对象类id
          type: string
        condition:
          $ref: '#/components/schemas/Condition'
          description: 当前对象类的过滤条件
        sort:
          description: 对当前对象类的排序字段
          type: array
          items:
            $ref: '#/components/schemas/Sort'
        limit:
          description: "对象类获取对象数量的限制,默认10"
          type: integer
    TypeEdge:
      description: 路径中的边信息。通过关系类id确定边，通过路径的起点和终点来确定当前路径的方向为正向还是反向，与关系类的起终点一致为正向，相反则为反向。
      required:
      - relation_type_id
      - source_object_type_id
      - target_object_type_id
      type: object
      properties:
        relation_type_id:
          description: 关系类id
          type: string
        source_object_type_id:
          description: 路径的起点对象类
          type: string
        target_object_type_id:
          description: 路径的终点对象类id
          type: string
    RelationTypePath:
      description: 基于路径获取对象子图
      required:
      - source_object_type_id
      - direction
      - path_length
      - relation_types
      - object_types
      type: object
      properties:
        object_types:
          description: 路径中的对象类集合，顺序跟路径中节点出现顺序保持一致。
          type: array
          items:
            $ref: '#/components/schemas/ObjectTypeOnPath'
        relation_types:
          description: 路径的边集合，沿着路径顺序出现的边
          type: array
          items:
            $ref: '#/components/schemas/TypeEdge'
        limit:
          description: 当前路径返回的路径数量的限制。默认10
          type: integer
    ObjectSubGraphResponse:
      description: 对象子图
      required:
      - objects
      - relation_paths
      - total_count
      - search_after
      type: object
      properties:
        objects:
