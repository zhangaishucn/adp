  /api/ontology-query/v1/knowledge-networks/{kn_id}/action-types/{at_id}/execute:
    summary: 执行指定行动类的行动
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActionExecutionRequest"
            examples:
              执行行动-多个对象:
                value:
                  _instance_identities:
                    - pod_ip: "192.168.1.1"
                      id: 1
                    - pod_ip: "192.168.1.2"
                      id: 2
                  dynamic_params:
                    Authorization: "Bearer xxx"
        required: true
      parameters:
        - name: kn_id
          description: 业务知识网络ID
          schema:
            type: string
          in: path
          required: true
        - name: at_id
          description: 行动类ID
          schema:
            type: string
          in: path
          required: true
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionExecutionResponse"
              examples:
                执行行动-成功提交:
                  value:
                    execution_id: "cqq2g8h4d2fg00fvm8dg"
                    status: "pending"
                    message: "Action execution started"
                    created_at: 1704067200000
          description: accepted
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: 请求参数错误
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: 行动类不存在
      summary: 执行行动类

  /api/ontology-query/v1/knowledge-networks/{kn_id}/action-executions/{execution_id}:
    summary: 获取行动执行状态
    get:
      parameters:
        - name: kn_id
          description: 业务知识网络ID
          schema:
            type: string
          in: path
          required: true
        - name: execution_id
          description: 执行ID
          schema:
            type: string
          in: path
          required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionExecution"
              examples:
                获取执行状态-已完成:
                  value:
                    id: "cqq2g8h4d2fg00fvm8dg"
                    kn_id: "kn_xxx"
                    action_type_id: "at_xxx"
                    action_type_name: "restart_pod"
                    action_source_type: "tool"
                    object_type_id: "ot_xxx"
                    trigger_type: "manual"
                    status: "completed"
                    total_count: 2
                    success_count: 1
                    failed_count: 1
                    results:
                      - instance_identity:
                          pod_ip: "192.168.1.1"
                          id: 1
                        status: "success"
                        parameters:
                          pod_ip: "192.168.1.1"
                        result:
                          message: "Pod restarted successfully"
                        duration_ms: 1200
                      - instance_identity:
                          pod_ip: "192.168.1.2"
                          id: 2
                        status: "failed"
                        parameters:
                          pod_ip: "192.168.1.2"
                        error_message: "Connection timeout"
                        duration_ms: 5000
                    executor_id: "user_xxx"
                    executor:
                      id: "user_xxx"
                      type: "user"
                      name: "张三"
                    start_time: 1704067200000
                    end_time: 1704067206200
                    duration_ms: 6200
          description: ok
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: 执行记录不存在
      summary: 获取行动执行状态

  /api/ontology-query/v1/knowledge-networks/{kn_id}/action-logs:
    summary: 查询行动执行日志
    get:
      parameters:
        - name: kn_id
          description: 业务知识网络ID
          schema:
            type: string
          in: path
          required: true
        - name: action_type_id
          description: 行动类ID（可选）
          schema:
            type: string
          in: query
        - name: status
          description: 执行状态（可选）
          schema:
            enum:
              - pending
              - running
              - completed
              - failed
              - cancelled
            type: string
          in: query
        - name: trigger_type
          description: 触发类型（可选）
          schema:
            enum:
              - manual
              - scheduled
            type: string
          in: query
        - name: start_time_from
          description: 开始时间范围-起始（毫秒时间戳，可选）
          schema:
            type: integer
            format: int64
          in: query
        - name: start_time_to
          description: 开始时间范围-结束（毫秒时间戳，可选）
          schema:
            type: integer
            format: int64
          in: query
        - name: limit
          description: 返回数量限制，默认20，最大1000
          schema:
            type: integer
            default: 20
          in: query
        - name: need_total
          description: 是否需要返回总数
          schema:
            type: boolean
            default: false
          in: query
        - name: search_after
          description: 分页游标（逗号分隔字符串，如 "1704067200000,cqq2g8h4d2fg00fvm8dg"）
          schema:
            type: string
          in: query
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionExecutionList"
              examples:
                查询执行日志-成功:
                  value:
                    entries:
                      - id: "cqq2g8h4d2fg00fvm8dg"
                        action_type_id: "at_xxx"
                        action_type_name: "restart_pod"
                        status: "completed"
                        trigger_type: "manual"
                        total_count: 2
                        success_count: 2
                        failed_count: 0
                        start_time: 1704067200000
                        duration_ms: 6200
                    total_count: 100
                    search_after:
                      - 1704067200000
                      - "cqq2g8h4d2fg00fvm8dg"
          description: ok
      summary: 查询行动执行日志

  /api/ontology-query/v1/knowledge-networks/{kn_id}/action-logs/{log_id}:
    summary: 获取单条行动执行日志
    get:
      parameters:
        - name: kn_id
          description: 业务知识网络ID
          schema:
            type: string
          in: path
          required: true
        - name: log_id
          description: 日志ID (即执行ID)
          schema:
            type: string
          in: path
          required: true
        - name: results_limit
          description: results 分页大小，默认100，最大1000
          schema:
            type: integer
            default: 100
          in: query
        - name: results_offset
          description: results 偏移量，默认0
          schema:
            type: integer
            default: 0
          in: query
        - name: results_status
          description: 按 results 中的状态过滤（可选）
          schema:
            enum:
              - success
              - failed
            type: string
          in: query
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionExecution"
          description: ok
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: 日志不存在
      summary: 获取单条行动执行日志

  /api/ontology-query/v1/knowledge-networks/{kn_id}/action-logs/{log_id}/cancel:
    summary: 取消正在执行的任务
    post:
      parameters:
        - name: kn_id
          description: 业务知识网络ID
          schema:
            type: string
          in: path
          required: true
        - name: log_id
          description: 日志ID (即执行ID)
          schema:
            type: string
          in: path
          required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelExecutionRequest"
        required: false
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelExecutionResponse"
              examples:
                取消成功:
                  value:
                    execution_id: "cqq2g8h4d2fg00fvm8dg"
                    status: "cancelled"
                    message: "任务已取消"
                    cancelled_count: 5
                    completed_count: 10
          description: ok
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: 任务已完成或已取消，无法取消
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: 执行记录不存在
      summary: 取消正在执行的任务

components:
  schemas:
    Object:
      description: 对象的json，字段不定，随对象实例动态变化
      type: object
    ObjectTypeNode:
      description: 节点（对象类）信息
      required:
      - id
      - name
      type: object
      properties:
        id:
          description: 节点(对象类)ID
          type: string
        name:
          description: 节点（对象类）名称
          type: string
        condition:
          $ref: '#/components/schemas/Condition'
          description: 过滤条件。当在当前节点上有过滤条件时才需要填入。
    Sort:
      description: 排序字段
      required:
      - field
      - direction
      type: object
      properties:
        field:
          description: 排序字段
          type: string
        direction:
          description: 排序方向
          enum:
          - desc
          - asc
          type: string
    ObjectQueryBaseOnObjectType:
      description: 对象实例查询请求体
      required:
      - sort
      - limit
      type: object
      properties:
        condition:
          $ref: '#/components/schemas/Condition'
          description: 过滤条件
        sort:
          $ref: '#/components/schemas/Sort'
          description: 排序字段，默认使用 @timestamp排序，排序方向为 desc
        limit:
          description: 返回的数量，默认值 10。范围 1-10000
          type: integer
        need_total:
          description: 是否需要总数，默认false
          type: boolean
    FirstQueryWithSearchAfter:
      description: 分页查询的第一次查询请求
      required:
      - limit
      type: object
      properties:
        condition:
          $ref: '#/components/schemas/Condition'
          description: 过滤条件
        sort:
          description: 排序字段，默认使用 _score 倒序，主键字段正序
          type: array
          items:
            $ref: '#/components/schemas/Sort'
        limit:
          description: 返回的数量，默认值 10。范围 1-10000
          type: integer
        need_total:
          description: 是否需要总数，默认false
          type: boolean
        properties:
          description: 指定需要输出的属性集。默认为全部数据属性
          type: array
          items:
            type: string
    FulltextConfig:
      description: 全文索引的配置
      required:
      - analyzer
      - field_keyword
      type: object
      properties:
        analyzer:
          description: 分词器
          enum:
          - standard
          - ik_max_word
          type: string
        field_keyword:
          description: 是否保留原始字符串，保留原始字符串可用于精确匹配。默认是false
          type: boolean
    DataSource:
      description: 数据来源
      required:
      - type
      - id
      type: object
      properties:
        type:
          description: 数据来源类型为数据视图
          enum:
          - data_view
          type: string
        id:
          description: 数据视图ID
          type: string
        name:
          description: 名称。查看详情时返回。
          type: string
    MetricProperty:
      description: 指标属性
      required:
      - property_type
      - mapping_source_id
      - has_any_unfilled_params
      - parameters
      - dynamic_params
      type: object
      properties:
        property_type:
          description: 属性类型
          enum:
          - metric
          type: string
        mapping_source_id:
          description: 映射的指标模型id
          type: string
        has_any_unfilled_params:
          description: 是否有未填充的参数，默认是false
          type: boolean
        parameters:
          $ref: '#/components/schemas/MetricFilters'
          description: 实例化了的参数
        dynamic_params:
          $ref: '#/components/schemas/MetricRequiredParams'
          description: 动态参数
    MetricFilters:
      description: 指标模型属性的计算参数
      required:
      - Filters
      type: object
      properties:
        Filters:
          description: 指标模型过滤条件
          type: array
          items:
            $ref: '#/components/schemas/Filter'
    Filter:
      description: 过滤条件
      required:
      - name
      - value
      - operation
      type: object
      properties:
        name:
          description: 过滤字段名称
          type: string
        value:
          description: "过滤的值。当 operation 是 in 时，value 为任意基本类型的数组，且长度大于等于1；当 operation\
            \ 是 = 或 != 时，value 为任意基本类型的值；当 operation 是 range 时，value 是个由范围的下边界和上边界\
            组成的长度为 2 的数值型数组。当 operation 是 out_range 时, value 是一个长度为 2 的数组，对应过滤条件时是\
            \ 字段 < value[0] || 字段 >= value[1]"
          type: array
          items: {}
        operation:
          description: 操作符。
          enum:
          - in
          - '='
          - '!='
          - range
          - out_range
          - like
          - not_like
          - '>'
          - '>='
          - '<'
          - '<='
          type: string
    MetricRequiredParams:
      description: 指标模型查询的动态参数
      required:
      - instant
      - start
      - end
      type: object
      properties:
        instant:
          description: 是否即时查询。默认为false，非即时查询，即为趋势查询
          type: boolean
        start:
          description: 开始时间戳
          type: integer
        end:
          description: 结束时间戳
          type: integer
    MetricPropertyDynamicParams:
      description: |
        指标属性的 dynamic_params 结构。当属性是指标属性时，dynamic_params 应遵循此 schema。
        包含时间参数、分析参数以及指标属性配置中定义的其他动态参数。
      type: object
      properties:
        start:
          description: "指标查询的开始时间。start=< unix_timestamp >，单位到毫秒。例如: 1646360670123"
          format: int64
          type: integer
        end:
          description: "指标查询的结束时间。end=< unix_timestamp >，单位到毫秒。例如: 1646471470123"
          format: int64
          type: integer
        instant:
          description: |
            是否是即时查询。可选，默认为 false。当 instant = true 时，表示即时查询；当 instant = false 时，表示范围查询。
          type: boolean
        step:
          description: |
            范围查询的步长。当 instant 为 false 时，建议提供。step=< time_durations >，用一个数字，后面跟时间单位来定义。
            若不填单位，则默认按秒计算。时间单位可以是如下之一：ms - 毫秒；s - 秒；m - 分钟；h - 小时；d - 天；w - 周；y - 年；
          type: string
        analysis_dimensions:
          description: 分析维度。即在指标查询时可指定的下钻维度集合
          type: array
          items:
            type: string
        order_by_fields:
          description: 排序字段。即在指标查询时可指定的排序字段集合
          type: array
          items:
            $ref: '#/components/schemas/OrderField'
        having_condition:
          $ref: '#/components/schemas/HavingCondition'
          description: having值过滤。即在指标查询时可指定的值过滤的过滤条件
        metrics:
          $ref: '#/components/schemas/Metrics'
          description: 同环比、占比分析
      additionalProperties:
            oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: integer
    OrderField:
      description: 排序字段
      required:
      - name
      - direction
      type: object
      properties:
        name:
          description: 字段名
          type: string
        direction:
          description: 排序方向
          enum:
          - asc
          - desc
          type: string
    HavingCondition:
      description: having值数据过滤
      required:
      - operation
      - value
      - field
      type: object
      properties:
        field:
          description: 字段名称。只有 __value
          enum:
          - __value
          type: string
        operation:
          description: 操作符
          enum:
          - ==
          - '!='
          - '>'
          - '>='
          - <
          - <=
          - in
          - not_in
          - range
          - out_range
          type: string
        value:
          description: 字段值
    Metrics:
      description: 同环比、占比分析
      required:
      - type
      type: object
      properties:
        type:
          description: 同环比占比类型。同环比：sameperiod；占比：proportion
          enum:
          - sameperiod
          - proportion
          type: string
        sameperiod_config:
          $ref: '#/components/schemas/SameperiodConfig'
          description: 同环比配置
    SameperiodConfig:
      description: 同环比配置
      required:
      - offset
      - time_granularity
      type: object
      properties:
        method:
          description: 计算方法，增长值或增长率
          type: array
          default:
            - growth_value
            - growth_rate
          items:
            type: string
            enum:
              - growth_value
              - growth_rate
        offset:
          description: 偏移量
          type: integer
        time_granularity:
          description: 时间粒度
          enum:
          - day
          - month
          - quarter
          - year
          type: string
    ObjectTypeDetail:
      description: 节点（对象类）信息
      required:
      - id
      - name
      - comment
      - tags
      - kn_id
      - groups
      - data_source
      - data_properties
      - primary_keys
      - display_key
      - type
      - module_type
      - branch
      - color
      - icon
      - logic_properties
      - concept_groups
      - creator
      - update_time
      - updater
      - create_time
      - detail
      type: object
      properties:
        id:
          description: 对象类ID
          type: string
        name:
          description: 对象类名称
          type: string
        tags:
          description: 标签。 （可以为空）
          type: array
          items:
            type: string
        comment:
          description: 备注（可以为空）
          type: string
        icon:
          description: 图标
          type: string
        color:
          description: 颜色
          type: string
        branch:
          description: 分支ID
          type: string
        kn_id:
          description: 业务知识网络id
          type: string
        concept_groups:
          description: 概念分组id
          type: array
          items:
            $ref: '#/components/schemas/ConceptGroup'
        data_source:
          $ref: '#/components/schemas/DataSource'
          description: 数据来源
        data_properties:
          description: 数据属性
          type: array
          items:
            $ref: '#/components/schemas/DataProperty'
        logic_properties:
