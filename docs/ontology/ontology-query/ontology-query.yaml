        type:
          description: 属性数据类型。除了视图的字段类型之外，还有 metric、objective、event、trace、log、operator
          type: string
        comment:
          description: 属性描述
          type: string
        mapped_field:
          $ref: '#/components/schemas/ViewField'
          description: 属性映射到数据来源中的字段名
        index:
          description: 是否开启索引，默认是true
