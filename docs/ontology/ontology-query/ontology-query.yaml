      properties:
        datas:
          description: 对象实例数据。动态数据字段，其值可以是基本类型、MetricProperty或OperatorProperty
          type: array
          items:
            $ref: '#/components/schemas/ObjectPropertyValue'
    ActionParam:
      description: 行动参数
      required:
      - parameters
