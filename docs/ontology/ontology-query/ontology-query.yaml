        display_name:
          description: 字段显示名.查看时有此字段
          type: string
        type:
          description: 视图字段类型，查看时有此字段
          type: string
    VectorConfig:
      description: 向量索引的配置
      required:
      - dimension
      type: object
      properties:
        dimension:
          description: 向量维度
          type: integer
    LogicProperty:
      description: 逻辑属性
      required:
      - name
      - data_source
      - parameters
      type: object
      properties:
        name:
          description: 属性名称。只能包含小写英文字母、数字、下划线（_）、连字符（-），且不能以下划线和连字符开头
          type: string
        display_name:
          description: 属性显示名
          type: string
        type:
          description: 属性数据类型。除了视图的字段类型之外，还有 metric、objective、event、trace、log、operator
          type: string
        comment:
          description: 属性描述
          type: string
        index:
          description: 是否开启索引，默认是true
          type: boolean
        data_source:
          $ref: '#/components/schemas/LogicSource'
          description: 逻辑来源
        parameters:
          description: 逻辑所需的参数
          type: array
          items:
            $ref: '#/components/schemas/Parameter'
    LogicSource:
      description: 数据来源
      required:
      - type
      - id
