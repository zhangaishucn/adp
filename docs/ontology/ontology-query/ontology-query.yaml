      type: object
      properties:
        relations:
          description: 路径的边集合，沿着路径顺序出现的边
          type: array
          items:
            $ref: '#/components/schemas/Relation'
        length:
          description: 当前路径的长度
          type: integer
    Relation:
      description: 一度关系（边）
      required:
